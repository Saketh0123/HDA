name: eduhub_mobile
description: A clean and minimal student management mobile application.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.2
  cloud_functions: ^5.0.2
  firebase_app_check: ^0.3.0+4
  http: ^1.1.0
  provider: ^6.0.0
  intl: ^0.18.0
  shared_preferences: ^2.2.0
  fl_chart: ^0.63.0
  dio: ^5.2.0
  app_links: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.jpeg"
  adaptive_icon_background: "#1E1B4B"
  adaptive_icon_foreground: "assets/icons/logo.jpeg"

flutter:
  uses-material-design: true
