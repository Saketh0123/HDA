<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HDA - Continue</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; padding: 24px; background: #0b1220; color: #e5e7eb; }
      .card { max-width: 560px; margin: 0 auto; background: #111827; border: 1px solid #243244; border-radius: 16px; padding: 20px; }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { margin: 8px 0; color: #cbd5e1; line-height: 1.5; }
      a.button { display: inline-block; margin-top: 14px; padding: 10px 14px; border-radius: 10px; background: #2563eb; color: white; text-decoration: none; font-weight: 600; }
      code { background: #0b1220; border: 1px solid #243244; padding: 2px 6px; border-radius: 8px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Continue in the HDA app</h1>
      <p>If the app is installed, this page will open it automatically.</p>
      <p>If it doesn’t open, tap the button below.</p>
      <a id="openApp" class="button" href="#">Open HDA</a>
      <p style="margin-top:16px; font-size: 12px; color:#94a3b8;">
        Tip: If you see a code in the URL like <code>oobCode</code>, keep this page open while switching to the app.
      </p>
    </div>

    <script>
      (function () {
        // Firebase Auth action links include query params like:
        // ?mode=resetPassword&oobCode=... or ?mode=verifyEmail&oobCode=...
        var params = new URLSearchParams(window.location.search);
        var mode = params.get('mode') || '';
        var oobCode = params.get('oobCode') || '';

        // Custom scheme deep link consumed by the Flutter app.
        var deepLink = 'eduhub://auth?mode=' + encodeURIComponent(mode) + '&oobCode=' + encodeURIComponent(oobCode);

        var btn = document.getElementById('openApp');
        btn.href = deepLink;

        // Try to open automatically.
        // Some browsers/webviews may block this; the button remains as fallback.
        window.location.replace(deepLink);
      })();
    </script>
  </body>
</html>
